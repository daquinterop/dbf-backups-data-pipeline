[paths]
path_raw_sacfa_zips = "/mnt/c/Users/quint021/OneDrive - Wageningen University & Research/Data/SACFA"
path_raw_sacfa_tables = "/home/quint021/data/fedearroz/sacfa/tables-raw"

[sacfa-pars]
sacfa_folders = [
    "SACFA_2021B", "SACFA_2023A", "SACFAS_2022A", "SACFAS_2022B",
    "SACFAS_2024A"
]
sacfa_tables = [ 
    "infculti", "insaplica", "labor", "Cultivo", "municips", 
    "concepto", "jorculti", "insumonal", "lotesfin", "ubica", 
    "labculti", "fincas", "Undcomp", "Invimpr"
]

# Parameters to define the tables to create 

[[table]] # Each table to generate
name = "InputUse"
# Index of the table (optional) If no index, then sequential will be considered.
# The index is generated by combining the idx columns as str with the agronomo
# and municipio, and the table name, and then creating a 32 char hash of that string.
# The idea of the index is the guarantee that each different record as a unique
# identifier. This can be tricky as when the agronomo changes laptop, the unique
# identifiers of each record would repeat. That is why I add extra information 
# such as the date. Some fields are taken from other tables.
idx = ["CODAPLIC", "NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"] 
    [table.base] # The base table to use
    name = "insaplica"
    columns = [
        "NUMCONTROL", "CODAPLIC", "CODTIPO", "CODINSUM", "CODUNID", "CANTAPLIC", 
        "FORMA1", "FECHAPLI", "FECHAGER"
    ]
    [[table.join]] # The tables to be joined to this table
    name = "insumonal"
    idx = "CODINSUM"
    on = "CODINSUM"
    columns = [
        "CODTIPNAL", "CODINSUM", "NOMBREINS", "UNIDAD", "NOMBRE",
        "NITROGENO", "FOSFORO", "POTASIO", "OTROS", "ING_ACTIVO", "IACTIVO", "S", 
        "MG", "CA", "ZN", "FE", "MN", "CU", "CL", "B", "SI", "MO"
    ]
    # prefix = "INSUM_"
    # [[table.join]]
    # name = "Invimpr"
    # idx = "CODTIPO"
    # on = "CODTIPNAL"
    # columns = ["CODTIPO", "TIPINSUMO"]
    [[table.join]]
    name = "infculti"
    idx = "NUMCONTROL"
    on = "NUMCONTROL"
    columns = ["NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"]

[[table]]
name = "Campaign"
idx = ["NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"]
    [table.base]
    name = "infculti"
    columns = ["NUMCONTROL", "CODLOTE", "ANO", "SEMESTRE", "SISTEMA", "TONELADAS"]
    [[table.join]]
    name = "lotesfin"
    idx = "CODLOTE"
    on = "CODLOTE"
    columns = ["CODLOTE", "NOMLOTE", "AREA", "COFINCA"]

[[table]]
name = "Field"
idx = ["CODLOTE", "COFINCA"]
    [table.base]
    name = "lotesfin"
    columns = ["COFINCA", "FINCA", "ARREND", "AREA", "CODLOTE", "NOMLOTE"]

[[table]]
name = "Farm"
idx = ["COFINCA"]
    [table.base]
    name = "ubica"
    columns = [
        "CODFIN", "NOMFIN", "DEPARTAM", "MUNICIPIO", "PROPIETA", "COFINCA",
        "AGRONOMO", "ARRENDATAR", "TENENCIA", "VEREDA"
    ]

[[table]]
name = "Labor"
idx = ["CODAPLICA", "NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"]
    [table.base]
    name = "jorculti"
    columns = ["CODLABOR", "CODAPLICA", "NUMCONTROL", "FECHALAB", "CANTJORN", "OBSERVA"]
    [[table.join]]
    name = "labor"
    idx = "CODLABOR"
    on = "CODLABOR"
    columns = ["CODLABOR", "NOMLABOR", "FORMLABOR", "MARCALAB"]
    [[table.join]]
    name = "infculti"
    idx = "NUMCONTROL"
    on = "NUMCONTROL"
    columns = ["NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"]

[[table]]
name = "FieldOps"
idx = ["CODAPLICA", "NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"]
    [table.base]
    name = "labculti"
    columns = [
        "CODLABOR", "CODAPLICA", "NUMCONTROL", "FECHALAB", "CANTPASES", "HECTAREA",
        "OBSERVA"
    ]
    [[table.join]]
    name = "infculti"
    idx = "NUMCONTROL"
    on = "NUMCONTROL"
    columns = ["NUMCONTROL", "COFINCA", "CODLOTE", "ANO", "SEMESTRE"]

[relationships] # Connections between tables
[[relationships.Field]] 
    link = "Farm" # Other table to link
    from = "COFINCA" # Field to consider as index in the table to link
    to = "COFINCA" # Field in the table to map 
[[relationships.Campaign]]
    link = "Field"
    from = "CODLOTE"
    to = "CODLOTE"
[[relationships.InputUse]]
    link = "Campaign"
    from = "NUMCONTROL"
    to = "NUMCONTROL"
[[relationships.Labor]]
    link = "InputUse"
    from = "CODAPLIC"
    to = "CODAPLICA"
[[relationships.Labor]]
    link = "Campaign"
    from = "NUMCONTROL"
    to = "NUMCONTROL"
[[relationships.FieldOps]]
    link = "InputUse"
    from = "CODAPLIC"
    to = "CODAPLICA"
[[relationships.FieldOps]]
    link = "Campaign"
    from = "NUMCONTROL"
    to = "NUMCONTROL"

[columns-rename]
[columns-rename.insumonal]
    # NOMBRE = "NOMBREINS"